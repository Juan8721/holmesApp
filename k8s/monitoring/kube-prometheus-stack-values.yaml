# kube-prometheus-stack Helm values for EKS
# This configuration is optimized for Amazon EKS clusters where control plane components
# are managed by AWS and not directly accessible for Prometheus scraping.

# Disable ServiceMonitor creation for EKS-managed control plane components
# but keep the alert rules active. This prevents false alerts while maintaining
# monitoring capabilities if endpoints become available.

kubeScheduler:
  enabled: false  # Disable ServiceMonitor creation for EKS-managed scheduler
  
kubeControllerManager:
  enabled: false  # Disable ServiceMonitor creation for EKS-managed controller manager
  
kubeEtcd:
  enabled: false  # Disable ServiceMonitor creation for EKS-managed etcd

# Keep these enabled as they are accessible in EKS
kubelet:
  enabled: true
  
kubeApiServer:
  enabled: true
  
kubeProxy:
  enabled: true

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Keep default alert rules including KubeSchedulerDown
    # The alert will not fire if no targets are configured
    ruleSelector: {}
    
    # Configure service discovery to look for scheduler endpoints
    # This allows monitoring if scheduler endpoints are manually created
    additionalScrapeConfigs: |
      - job_name: 'kube-scheduler'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - kube-system
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: kube-scheduler
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: http-metrics
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

# Grafana configuration
grafana:
  enabled: true
  adminPassword: admin