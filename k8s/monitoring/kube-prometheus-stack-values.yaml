# Kube-Prometheus-Stack Helm Values for EKS
# 
# This configuration disables monitoring of EKS-managed control plane components
# to prevent false alerts like KubeSchedulerDown, KubeControllerManagerDown, etc.
#
# In EKS, these components are managed by AWS and not accessible for scraping:
# - kube-scheduler
# - kube-controller-manager  
# - etcd
#
# Apply with: helm upgrade kube-prom-stack prometheus-community/kube-prometheus-stack -f kube-prometheus-stack-values.yaml

# Disable kube-scheduler monitoring (fixes KubeSchedulerDown alert)
kubeScheduler:
  enabled: false

# Disable kube-controller-manager monitoring (prevents KubeControllerManagerDown alert)  
kubeControllerManager:
  enabled: false

# Disable etcd monitoring (prevents EtcdDown alert)
kubeEtcd:
  enabled: false

# Keep other components enabled for EKS worker node monitoring
kubelet:
  enabled: true
  
kubeApiServer:
  enabled: true
  
kubeProxy:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Retain data for 15 days
    retention: 15d
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

# Grafana configuration  
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi