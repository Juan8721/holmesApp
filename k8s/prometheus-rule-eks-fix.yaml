apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: eks-controller-manager-alert-fix
  namespace: observability
  labels:
    app: kube-prometheus-stack
    release: kube-prom-stack
spec:
  groups:
  - name: kubernetes-system-controller-manager-eks
    rules:
    # Modified alert rule that excludes EKS clusters
    - alert: KubeControllerManagerDown
      expr: |
        absent(up{job="kube-controller-manager"}) 
        and on() (
          # Only fire if this is NOT an EKS cluster
          # EKS clusters have managed control plane components
          absent(kube_node_info{kubelet_version=~".*eks.*"})
        )
      for: 15m
      labels:
        severity: critical
      annotations:
        description: KubeControllerManager has disappeared from Prometheus target discovery.
        summary: Target disappeared from Prometheus target discovery.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubecontrollermanagerdown
        eks_note: "This alert is disabled for EKS clusters as AWS manages the control plane components."