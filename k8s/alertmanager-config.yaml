apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: kube-prom-stack-alertmanager-config
  namespace: observability
spec:
  route:
    receiver: "null"
    groupBy:
      - alertname
      - cluster
      - service
    groupWait: 10s
    groupInterval: 10s
    repeatInterval: 12h
    routes:
      # Route for Watchdog alert - null receiver (no notifications)
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
            matchType: "="
      # Default route for all other alerts
      - receiver: "default"
        groupWait: 10s
        groupInterval: 10s
        repeatInterval: 12h
  receivers:
    # Null receiver - discards alerts (used for Watchdog)
    - name: "null"
    # Default receiver - can be configured with actual notification integrations
    - name: "default"
